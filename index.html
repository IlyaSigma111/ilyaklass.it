<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ИльЯкласс - Игрок</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            max-width: 500px;
            width: 90%;
            padding: 20px;
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo h1 {
            font-size: 42px;
            color: white;
            text-shadow: 3px 3px 0 rgba(0,0,0,0.2);
        }
        .logo p {
            color: rgba(255,255,255,0.8);
        }
        .card {
            background: white;
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .pin-input {
            width: 100%;
            padding: 20px;
            font-size: 32px;
            text-align: center;
            letter-spacing: 10px;
            border: 2px solid #e2e8f0;
            border-radius: 20px;
            margin-bottom: 20px;
            font-weight: bold;
            font-family: monospace;
        }
        .name-input {
            width: 100%;
            padding: 15px;
            font-size: 16px;
            border: 2px solid #e2e8f0;
            border-radius: 20px;
            margin-bottom: 20px;
        }
        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }
        .waiting-screen {
            text-align: center;
            padding: 40px;
        }
        .waiting-spinner {
            font-size: 64px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .question-card {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 30px;
            padding: 30px;
            color: white;
        }
        .question-text {
            font-size: 24px;
            text-align: center;
            margin-bottom: 30px;
        }
        .answers-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }
        .answer-btn {
            border: none;
            border-radius: 20px;
            padding: 18px;
            font-size: 18px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s;
            text-align: left;
            padding-left: 25px;
        }
        .answer-btn:active {
            transform: scale(0.97);
        }
        .answer-btn.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .answer-btn:nth-child(1) { background: #e74c3c; }
        .answer-btn:nth-child(2) { background: #3498db; }
        .answer-btn:nth-child(3) { background: #f39c12; }
        .answer-btn:nth-child(4) { background: #2ecc71; }
        .timer {
            text-align: center;
            font-size: 48px;
            font-weight: bold;
            color: #ffd700;
            margin: 20px 0;
        }
        .score-badge {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.6);
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            color: #ffd700;
        }
        .correct-feedback {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 80px;
            animation: pop 0.5s ease-out;
            pointer-events: none;
        }
        @keyframes pop {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            50% { transform: translate(-50%, -50%) scale(1.5); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 0; }
        }
        .result-screen {
            text-align: center;
            padding: 40px;
        }
        .final-score {
            font-size: 72px;
            color: #ffd700;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <div class="logo">
            <h1>🎮 ИльЯкласс</h1>
            <p>Введи код и играй!</p>
        </div>
        <div id="content"></div>
    </div>

    <script>
        const SB_URL = 'https://sekiunglzxycjkgraudd.supabase.co';
        const SB_KEY = 'sb_publishable_k5F_fZwKqsbwpO-itXvT9Q_UhRc6svh';
        const supabase = window.supabase.createClient(SB_URL, SB_KEY);
        
        let playerInfo = null;
        let currentGame = null;
        let currentQuestion = null;
        let hasAnswered = false;
        let questionStartTime = null;
        let gameActive = true;
        let currentScore = 0;
        
        showJoinScreen();
        
        function showJoinScreen() {
            document.getElementById('content').innerHTML = `
                <div class="card">
                    <input type="text" id="pinInput" class="pin-input" placeholder="PIN-код" maxlength="4">
                    <input type="text" id="nameInput" class="name-input" placeholder="Твоё имя">
                    <button class="btn" onclick="joinGame()">🔌 Войти в игру</button>
                </div>
            `;
        }
        
        async function joinGame() {
            const pin = document.getElementById('pinInput').value.trim();
            const playerName = document.getElementById('nameInput').value.trim();
            
            if (!pin || pin.length !== 4) {
                alert('Введи 4-значный PIN-код');
                return;
            }
            if (!playerName) {
                alert('Введи своё имя');
                return;
            }
            
            // Ищем игру по PIN
            const { data: game, error } = await supabase
                .from('game_sessions')
                .select('*')
                .eq('pin', pin)
                .single();
            
            if (error || !game) {
                alert('Игра с таким PIN не найдена');
                return;
            }
            
            if (game.status !== 'waiting') {
                alert('Игра уже началась');
                return;
            }
            
            currentGame = game;
            
            // Добавляем игрока
            const playerId = 'player_' + Date.now() + '_' + Math.random().toString(36).substring(2, 6);
            const { error: joinError } = await supabase
                .from('game_players')
                .insert({
                    id: playerId,
                    game_id: game.id,
                    player_name: playerName,
                    score: 0
                });
            
            if (joinError) {
                alert('Ошибка подключения: ' + joinError.message);
                return;
            }
            
            playerInfo = { id: playerId, name: playerName, gameId: game.id };
            startGameListener();
        }
        
        async function startGameListener() {
            document.getElementById('content').innerHTML = `
                <div class="card">
                    <div class="waiting-screen">
                        <div class="waiting-spinner">🎮</div>
                        <h2 style="margin-top:20px;">Ожидание начала...</h2>
                        <p style="margin-top:10px;">Код: <strong>${currentGame.pin}</strong></p>
                        <p>Имя: <strong>${playerInfo.name}</strong></p>
                    </div>
                </div>
                <div class="score-badge" id="scoreBadge">⭐ 0</div>
            `;
            
            // Подписываемся на изменения игры
            supabase
                .channel('game')
                .on('postgres_changes', {
                    event: 'UPDATE',
                    schema: 'public',
                    table: 'game_sessions',
                    filter: `id=eq.${currentGame.id}`
                }, (payload) => onGameUpdate(payload.new))
                .subscribe();
            
            // Подписываемся на изменения счёта
            supabase
                .channel('score')
                .on('postgres_changes', {
                    event: 'UPDATE',
                    schema: 'public',
                    table: 'game_players',
                    filter: `id=eq.${playerInfo.id}`
                }, (payload) => updateScore(payload.new.score))
                .subscribe();
        }
        
        async function onGameUpdate(game) {
            if (!gameActive) return;
            
            if (game.status === 'ended') {
                showGameEnd();
                return;
            }
            
            if (game.status === 'active') {
                await loadCurrentQuestion(game.current_question_index);
            }
        }
        
        async function loadCurrentQuestion(questionIndex) {
            const { data: question } = await supabase
                .from('game_questions')
                .select('*')
                .eq('game_id', currentGame.id)
                .eq('question_index', questionIndex)
                .single();
            
            if (!question) return;
            
            // Проверяем, отвечал ли уже игрок
            const { data: existingAnswer } = await supabase
                .from('game_answers')
                .select('*')
                .eq('question_id', question.id)
                .eq('player_id', playerInfo.id)
                .maybeSingle();
            
            if (existingAnswer) {
                showWaitForNext();
                return;
            }
            
            currentQuestion = question;
            hasAnswered = false;
            questionStartTime = Date.now();
            showQuestion(question);
        }
        
        function showQuestion(question) {
            document.getElementById('content').innerHTML = `
                <div class="question-card">
                    <div class="question-text">${escapeHtml(question.question_text)}</div>
                    <div class="timer" id="timer">${question.time_limit}</div>
                    <div class="answers-grid">
                        ${question.answers.map((ans, i) => `
                            <button class="answer-btn" onclick="submitAnswer(${i})">
                                ${String.fromCharCode(65+i)}. ${escapeHtml(ans)}
                            </button>
                        `).join('')}
                    </div>
                </div>
                <div class="score-badge" id="scoreBadge">⭐ ${currentScore}</div>
            `;
            
            let timeLeft = question.time_limit;
            const timerEl = document.getElementById('timer');
            
            const interval = setInterval(() => {
                timeLeft--;
                if (timerEl) timerEl.textContent = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(interval);
                    if (!hasAnswered) showTimeOut();
                }
            }, 1000);
            
            window.currentTimer = interval;
        }
        
        async function submitAnswer(answerIndex) {
            if (hasAnswered) return;
            if (!currentQuestion) return;
            
            clearInterval(window.currentTimer);
            hasAnswered = true;
            
            const responseTime = Date.now() - questionStartTime;
            
            const answerId = 'ans_' + Date.now() + '_' + Math.random().toString(36).substring(2, 6);
            
            await supabase.from('game_answers').insert({
                id: answerId,
                game_id: currentGame.id,
                question_id: currentQuestion.id,
                player_id: playerInfo.id,
                answer_index: answerIndex,
                response_time_ms: responseTime
            });
            
            const isCorrect = (answerIndex === currentQuestion.correct_answer);
            showFeedback(isCorrect);
            showWaitForNext();
        }
        
        function showFeedback(isCorrect) {
            const feedback = document.createElement('div');
            feedback.className = 'correct-feedback';
            feedback.textContent = isCorrect ? '✅' : '❌';
            document.body.appendChild(feedback);
            setTimeout(() => feedback.remove(), 500);
        }
        
        function showWaitForNext() {
            document.getElementById('content').innerHTML = `
                <div class="card">
                    <div class="waiting-screen">
                        <div class="waiting-spinner">⏳</div>
                        <h2 style="margin-top:20px;">Ответ принят!</h2>
                        <p>Ожидание следующего вопроса...</p>
                    </div>
                </div>
                <div class="score-badge" id="scoreBadge">⭐ ${currentScore}</div>
            `;
        }
        
        function showTimeOut() {
            document.getElementById('content').innerHTML = `
                <div class="card">
                    <div class="waiting-screen">
                        <div class="waiting-spinner">⏰</div>
                        <h2 style="margin-top:20px;">Время вышло!</h2>
                        <p>Следующий вопрос скоро начнётся</p>
                    </div>
                </div>
                <div class="score-badge" id="scoreBadge">⭐ ${currentScore}</div>
            `;
        }
        
        function updateScore(score) {
            currentScore = score || 0;
            const badge = document.getElementById('scoreBadge');
            if (badge) badge.innerHTML = `⭐ ${currentScore}`;
        }
        
        async function showGameEnd() {
            gameActive = false;
            
            const { data } = await supabase
                .from('game_players')
                .select('score')
                .eq('id', playerInfo.id)
                .single();
            
            document.getElementById('content').innerHTML = `
                <div class="card">
                    <div class="result-screen">
                        <h1>🏆 Игра окончена! 🏆</h1>
                        <div class="final-score">${data?.score || 0} ⭐</div>
                        <p>Твой финальный счёт</p>
                        <button class="btn" onclick="location.reload()">🎮 Новая игра</button>
                    </div>
                </div>
            `;
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m]));
        }
        
        window.joinGame = joinGame;
        window.submitAnswer = submitAnswer;
    </script>
</body>
</html>
