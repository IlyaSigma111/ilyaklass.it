<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ИльЯкласс - Игрок</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            max-width: 500px;
            width: 90%;
            padding: 20px;
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo h1 {
            font-size: 40px;
            color: white;
            text-shadow: 2px 2px 0 rgba(0,0,0,0.2);
        }

        .logo p {
            color: rgba(255,255,255,0.8);
        }

        .card {
            background: white;
            border-radius: 32px;
            padding: 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 500;
            margin-bottom: 8px;
            color: #334155;
        }

        .form-group input {
            width: 100%;
            padding: 16px;
            font-size: 18px;
            text-align: center;
            letter-spacing: 4px;
            border: 2px solid #e2e8f0;
            border-radius: 20px;
            font-family: monospace;
            font-weight: bold;
        }

        .form-group input:focus {
            outline: none;
            border-color: #6366f1;
        }

        .btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn:active {
            transform: scale(0.98);
        }

        /* Игровой экран */
        .score-badge {
            position: fixed;
            top: 16px;
            right: 16px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            padding: 8px 16px;
            border-radius: 40px;
            font-weight: bold;
            color: #ffd700;
        }

        .question-card {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 32px;
            padding: 32px;
            color: white;
        }

        .question-text {
            font-size: 24px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 32px;
            line-height: 1.3;
        }

        .answers-grid {
            display: grid;
            gap: 12px;
        }

        .answer-btn {
            border: none;
            border-radius: 20px;
            padding: 18px 20px;
            font-size: 16px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: transform 0.1s;
            text-align: left;
        }

        .answer-btn:active {
            transform: scale(0.97);
        }

        .answer-red { background: #e74c3c; }
        .answer-blue { background: #3498db; }
        .answer-yellow { background: #f39c12; }
        .answer-green { background: #2ecc71; }

        .timer {
            text-align: center;
            font-size: 48px;
            font-weight: bold;
            color: #ffd700;
            margin: 20px 0;
        }

        .waiting-screen {
            text-align: center;
            padding: 40px;
        }

        .spinner {
            font-size: 48px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .final-score {
            font-size: 64px;
            color: #ffd700;
            margin: 20px 0;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container" id="app"></div>

    <script>
        const SUPABASE_URL = 'https://sekiunglzxycjkgraudd.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_k5F_fZwKqsbwpO-itXvT9Q_UhRc6svh';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let playerInfo = null;
        let currentGame = null;
        let currentQuestion = null;
        let hasAnswered = false;
        let questionStartTime = null;
        let currentScore = 0;
        let gameActive = true;

        showJoinScreen();

        function showJoinScreen() {
            document.getElementById('app').innerHTML = `
                <div class="logo">
                    <h1>🎮 ИльЯкласс</h1>
                    <p>Введи код и играй!</p>
                </div>
                <div class="card">
                    <div class="form-group">
                        <label>PIN-код игры</label>
                        <input type="text" id="pinInput" maxlength="4" placeholder="0000">
                    </div>
                    <div class="form-group">
                        <label>Твоё имя</label>
                        <input type="text" id="nameInput" placeholder="Как тебя зовут?">
                    </div>
                    <button class="btn" onclick="joinGame()">🔌 Войти в игру</button>
                </div>
            `;
        }

        async function joinGame() {
            const pin = document.getElementById('pinInput').value.trim();
            const playerName = document.getElementById('nameInput').value.trim();

            if (!pin || pin.length !== 4) {
                alert('Введите 4-значный PIN-код');
                return;
            }
            if (!playerName) {
                alert('Введите ваше имя');
                return;
            }

            // Поиск игры по PIN
            const { data: game, error } = await supabase
                .from('game_sessions')
                .select('*')
                .eq('pin', pin)
                .single();

            if (error || !game) {
                alert('Игра с таким PIN не найдена');
                return;
            }

            if (game.status !== 'waiting') {
                alert('Игра уже началась или завершена');
                return;
            }

            currentGame = game;

            // Регистрация игрока
            const playerId = 'player_' + Date.now() + '_' + Math.random().toString(36).substring(2, 8);
            const { error: joinError } = await supabase
                .from('game_players')
                .insert({
                    id: playerId,
                    game_id: game.id,
                    player_name: playerName,
                    score: 0
                });

            if (joinError) {
                alert('Ошибка подключения: ' + joinError.message);
                return;
            }

            playerInfo = { id: playerId, name: playerName, gameId: game.id };
            startListening();
        }

        async function startListening() {
            renderWaiting();

            // Подписка на изменения игры
            supabase
                .channel('game')
                .on('postgres_changes', {
                    event: 'UPDATE',
                    schema: 'public',
                    table: 'game_sessions',
                    filter: `id=eq.${currentGame.id}`
                }, (payload) => onGameUpdate(payload.new))
                .subscribe();

            // Подписка на изменение счёта
            supabase
                .channel('score')
                .on('postgres_changes', {
                    event: 'UPDATE',
                    schema: 'public',
                    table: 'game_players',
                    filter: `id=eq.${playerInfo.id}`
                }, (payload) => updateScore(payload.new.score))
                .subscribe();
        }

        function renderWaiting() {
            document.getElementById('app').innerHTML = `
                <div class="card">
                    <div class="waiting-screen">
                        <div class="spinner">🎮</div>
                        <h2 style="margin-top: 20px;">Ожидание начала...</h2>
                        <p style="margin-top: 12px;">Код: <strong>${currentGame.pin}</strong></p>
                        <p>Имя: <strong>${escapeHtml(playerInfo.name)}</strong></p>
                    </div>
                </div>
                <div class="score-badge" id="scoreBadge">⭐ 0</div>
            `;
        }

        async function onGameUpdate(game) {
            if (!gameActive) return;

            if (game.status === 'ended') {
                showGameEnd();
                return;
            }

            if (game.status === 'active') {
                await loadCurrentQuestion(game.current_question_index);
            }
        }

        async function loadCurrentQuestion(questionIndex) {
            const { data: question } = await supabase
                .from('game_questions')
                .select('*')
                .eq('game_id', currentGame.id)
                .eq('question_index', questionIndex)
                .single();

            if (!question) return;

            // Проверяем, не отвечал ли уже игрок
            const { data: existing } = await supabase
                .from('game_answers')
                .select('*')
                .eq('question_id', question.id)
                .eq('player_id', playerInfo.id)
                .maybeSingle();

            if (existing) {
                renderWaiting();
                return;
            }

            currentQuestion = question;
            hasAnswered = false;
            questionStartTime = Date.now();
            renderQuestion(question);
        }

        function renderQuestion(question) {
            const colors = ['answer-red', 'answer-blue', 'answer-yellow', 'answer-green'];
            
            document.getElementById('app').innerHTML = `
                <div class="question-card">
                    <div class="question-text">${escapeHtml(question.question_text)}</div>
                    <div class="timer" id="timer">${question.time_limit}</div>
                    <div class="answers-grid">
                        ${question.answers.map((ans, i) => `
                            <button class="answer-btn ${colors[i]}" onclick="submitAnswer(${i})">
                                ${String.fromCharCode(65+i)}. ${escapeHtml(ans)}
                            </button>
                        `).join('')}
                    </div>
                </div>
                <div class="score-badge" id="scoreBadge">⭐ ${currentScore}</div>
            `;

            let timeLeft = question.time_limit;
            const timerEl = document.getElementById('timer');
            
            if (window.timerInterval) clearInterval(window.timerInterval);
            
            window.timerInterval = setInterval(() => {
                timeLeft--;
                if (timerEl) timerEl.textContent = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(window.timerInterval);
                    if (!hasAnswered) showTimeout();
                }
            }, 1000);
        }

        async function submitAnswer(answerIndex) {
            if (hasAnswered) return;
            if (!currentQuestion) return;

            clearInterval(window.timerInterval);
            hasAnswered = true;

            const responseTime = Date.now() - questionStartTime;

            const answerId = 'ans_' + Date.now() + '_' + Math.random().toString(36).substring(2, 8);

            await supabase
                .from('game_answers')
                .insert({
                    id: answerId,
                    game_id: currentGame.id,
                    question_id: currentQuestion.id,
                    player_id: playerInfo.id,
                    answer_index: answerIndex,
                    response_time_ms: responseTime
                });

            // Показываем ожидание
            renderWaiting();
        }

        function showTimeout() {
            document.getElementById('app').innerHTML = `
                <div class="card">
                    <div class="waiting-screen">
                        <div class="spinner">⏰</div>
                        <h2 style="margin-top: 20px;">Время вышло!</h2>
                        <p>Следующий вопрос скоро начнётся</p>
                    </div>
                </div>
                <div class="score-badge" id="scoreBadge">⭐ ${currentScore}</div>
            `;
        }

        function updateScore(score) {
            currentScore = score || 0;
            const badge = document.getElementById('scoreBadge');
            if (badge) badge.innerHTML = `⭐ ${currentScore}`;
        }

        async function showGameEnd() {
            gameActive = false;
            
            const { data } = await supabase
                .from('game_players')
                .select('score')
                .eq('id', playerInfo.id)
                .single();

            document.getElementById('app').innerHTML = `
                <div class="card" style="text-align: center;">
                    <h1>🏆 Игра окончена! 🏆</h1>
                    <div class="final-score">${data?.score || 0} ⭐</div>
                    <p>Твой финальный счёт</p>
                    <button class="btn" onclick="location.reload()" style="margin-top: 20px;">🎮 Новая игра</button>
                </div>
            `;
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' })[m]);
        }

        window.joinGame = joinGame;
        window.submitAnswer = submitAnswer;
    </script>
</body>
</html>
